name: Build APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 锁定最稳固的 Python 3.10 环境

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool libffi-dev cmake
          pip install --upgrade pip
          # 👇 这里是救命的护身符：死死锁住 Cython 版本！
          pip install buildozer "cython<3.0.0"

      - name: Build APK
        run: |
          # 解决许可证和 root 权限问题
          mkdir -p ~/.android
          echo "### User Accepted Licenses" > ~/.android/repositories.cfg
          export BUILDOZER_WARN_ON_ROOT=0
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: myrobot0327-apk
          path: bin/*.apk

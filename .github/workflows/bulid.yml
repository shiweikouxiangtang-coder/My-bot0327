name: Build APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt update
          # 完整的构建工具链 - 包括 libtool-bin 和 m4
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool libtool-bin m4 libffi-dev cmake build-essential ccache libssl-dev pkg-config
          pip install --upgrade pip
          pip install buildozer "cython<3.0.0"

      - name: Clean previous builds
        run: |
          rm -rf .buildozer
          rm -rf bin

      - name: Build APK
        run: |
          # 解决许可证和 root 权限问题
          mkdir -p ~/.android
          echo "### User Accepted Licenses" > ~/.android/repositories.cfg
          export BUILDOZER_WARN_ON_ROOT=0
          # 添加更多内存和线程配置以提高构建速度
          export LDFLAGS="-lm"
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: myrobot0327-apk
          path: bin/*.apk
          retention-days: 30

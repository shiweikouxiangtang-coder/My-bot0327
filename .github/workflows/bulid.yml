name: Build APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/kivy:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install additional dependencies
        run: |
          apt update
          apt install -y git zip unzip cmake

      - name: Clean previous builds
        run: |
          rm -rf .buildozer
          rm -rf bin

      - name: Build APK
        run: |
          # 准备 Android 环境
          mkdir -p ~/.android
          echo "### User Accepted Licenses" > ~/.android/repositories.cfg
          export BUILDOZER_WARN_ON_ROOT=0
          
          # 构建 APK（使用容器内的 buildozer）
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: myrobot0327-apk
          path: bin/*.apk
          retention-days: 30

      - name: Show build artifacts
        if: success()
        run: |
          echo "✅ APK build successful!"
          ls -lh bin/
